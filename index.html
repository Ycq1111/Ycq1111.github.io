<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="延续主义，一个关于时间、记忆与创造持续生长的概念首页。">
  <link rel="icon" type="image/png" href="candle.png">
  <link rel="stylesheet" href="styles.css">
  <title>延续主义</title>
</head>
<body>
  <main class="hero">
    <div class="hero__backdrop"></div>
    <section class="hero__content">
      <p class="eyebrow">Continuism</p>
      <h1>延续主义</h1>
      <p class="intro">A value orientation for the long-term survival and continued improvement of human civilization.</p>
      <div class="definition-card">
        <p class="definition-label">Definition</p>
        <p class="definition-text">
          是以人类文明长期存续和持续改善为目的的价值观，其不以当代多数意志、短期福利或局部正义为准，
          而以提升是否人类整体在长时间尺度上的生存概率和发展上限为标准。其方法论在于保存和积累人类发展中出现的有利因素。
        </p>
      </div>
    </section>
  </main>
</body>
</html>
